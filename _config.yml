    url: /
  - title: Publications
    url: /publications/
  - title: Talks
    url: /talks/
  - title: Teaching
    url: /teaching/
  - title: CV
    url: /cv/

# --- Files Jekyll should ignore ---
exclude:
  - Gemfile
  - Gemfile.lock
  - vendor
  - .gitignore
  - README.md
